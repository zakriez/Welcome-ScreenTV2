<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MODENAS Welcome Page - Full Icons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        body {
            background-image: url('Gemini_Generated_Image_xlorrsxlorrsxlor.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 3vh 2vw;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* Logo Diperbesarkan */
        .logo-container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            margin-top: 2vh;
        }

        .logo {
            width: 45vw;
            max-width: 800px;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.7));
        }

        /* Bahagian Tengah */
        .welcome-container {
            position: absolute;
            top: 55%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 15;
            text-align: center;
            width: 100%;
        }

        .welcome-text {
            color: white;
            font-size: 8.5vw;
            font-weight: 900;
            letter-spacing: 12px;
            text-transform: uppercase;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 3vh;
            white-space: nowrap;
        }

        .visitor-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5vh;
        }

        .editable {
            color: #ffffff;
            outline: none;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-style: italic;
        }

        .visitor-name {
            font-size: 3.8vw;
            font-weight: 600;
            letter-spacing: 6px;
            border-bottom: 3px solid rgba(255,255,255,0.2);
            padding: 0.5vh 5vw;
            min-width: 50vw;
        }

        .visit-purpose {
            font-size: 1.8vw;
            font-weight: 300;
            letter-spacing: 4px;
            opacity: 0.6;
            color: #bdc3c7;
        }

        .editable:focus {
            opacity: 1;
            border-bottom: 3px solid #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        /* Bar Info Bawah dengan Ikon */
        .bottom-bar {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3.5vw;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 1.2vh 4vw;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1.1vw;
            margin-bottom: 1vh;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Border pemisah antara item */
        .info-item:not(:first-child) {
            border-left: 1px solid rgba(255,255,255,0.3);
            padding-left: 3.5vw;
        }

        .bar-icon {
            font-size: 1.3vw;
            color: #ffffff;
            opacity: 0.9;
        }

        .weather-icon {
            font-size: 1.5vw;
            color: #ffdb58; /* Warna kuning emas untuk cuaca */
        }

        #clock { font-weight: 600; font-family: 'Courier New', Courier, monospace; }

        @keyframes moveText {
            0% { transform: translateY(-8px); }
            100% { transform: translateY(8px); }
        }
    </style>
</head>
<body onclick="requestFullScreen()">

    <div class="overlay"></div>

    <div class="logo-container">
        <img src="Dark_Background (1).gif" alt="MODENAS" class="logo">
    </div>

    <div class="welcome-container">
        <h1 class="welcome-text">Selamat Datang</h1>
        
        <div class="visitor-info">
            <div class="visitor-name editable" contenteditable="true" spellcheck="false">NAMA PELAWAT</div>
            <div class="visit-purpose editable" contenteditable="true" spellcheck="false">TUJUAN LAWATAN</div>
        </div>
    </div>

    <div class="bottom-bar">
        <div class="info-item">
            <i class="fa-regular fa-clock bar-icon"></i>
            <span id="clock">00:00:00</span>
        </div>

        <div class="info-item">
            <i class="fa-regular fa-calendar-days bar-icon"></i>
            <span id="date">Memuatkan...</span>
        </div>

        <div class="info-item">
            <i id="w-icon" class="fas fa-cloud-sun weather-icon"></i>
            <span id="temp">--</span>°C
            <span id="desc" style="opacity: 0.8;">Sila tunggu</span>
        </div>
    </div>

    <script>
        function requestFullScreen() {
            var el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        }

        function updateDisplay() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { 
                hour: '2-digit', minute: '2-digit', second: '2-digit' 
            });
            document.getElementById('date').innerText = now.toLocaleDateString('ms-MY', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            });
        }

        async function updateWeather() {
            try {
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=5.81&longitude=100.47&current_weather=true');
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                document.getElementById('temp').innerText = temp;

                let iconClass = "fa-sun";
                let descText = "Cerah";

                if (code >= 1 && code <= 3) { iconClass = "fa-cloud-sun"; descText = "Berawan"; }
                else if (code >= 45 && code <= 48) { iconClass = "fa-smog"; descText = "Berkabus"; }
                else if (code >= 61 && code <= 67) { iconClass = "fa-cloud-showers-heavy"; descText = "Hujan"; }
                else if (code >= 95) { iconClass = "fa-bolt-lightning"; descText = "Petir"; }

                document.getElementById('w-icon').className = `fas ${iconClass} weather-icon`;
                document.getElementById('desc').innerText = descText;
            } catch (e) {
                document.getElementById('desc').innerText = "N/A";
            }
        }

        document.querySelectorAll('.editable').forEach(item => {
            item.addEventListener('focus', function() {
                if (this.innerText === "NAMA PELAWAT" || this.innerText === "TUJUAN LAWATAN") {
                    this.innerText = "";
                }
            });
            item.addEventListener('blur', function() {
                if (this.innerText.trim() === "") {
                    this.innerText = (this.classList.contains('visitor-name')) ? "NAMA PELAWAT" : "TUJUAN LAWATAN";
                }
            });
        });

        setInterval(updateDisplay, 1000);
        updateDisplay();
        updateWeather();
        setInterval(updateWeather, 900000);
    </script>
</body>
</html>
